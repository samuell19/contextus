services:
  postgres:
    image: postgres:16-alpine
    container_name: multiagent-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-multiagent_platform}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-multiagent_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: samuell19/projeetotcc:api-latest
    container_name: multiagent-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_PORT: 3000
      APP_URL: ${APP_URL:-http://localhost:3000}
      WEB_URL: ${WEB_URL:-http://localhost:8080}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-multiagent_platform}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-ma_refresh}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_DEFAULT_MODEL: ${OPENROUTER_DEFAULT_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_SUMMARY_MODEL: ${OPENROUTER_SUMMARY_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-Multiagent Platform}
      OPENROUTER_APP_URL: ${OPENROUTER_APP_URL:-http://localhost:3000}
      CHAT_HISTORY_LIMIT: ${CHAT_HISTORY_LIMIT:-20}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-5}
    command: >-
      sh -c "node apps/api/dist/src/scripts/migrate.js && node apps/api/dist/src/index.js"
    ports:
      - "3000:3000"
    volumes:
      - api_storage:/app/storage

  web:
    image: samuell19/projeetotcc:web-latest
    container_name: multiagent-web
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  postgres_data:
  api_storage:
