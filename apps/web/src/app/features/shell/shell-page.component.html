<main class="h-screen w-full flex overflow-hidden bg-ui-950/30">
  <app-session-sidebar
    class="shrink-0 z-10 w-[300px] border-r border-white/5 bg-ui-900/40 backdrop-blur-xl flex flex-col transition-all duration-300"
    [hasAgents]="agents().length > 0"
    [selectedAgentName]="selectedAgent()?.name ?? null"
    [selectedAgentId]="selectedAgentId()"
    [sessions]="sessions()"
    [selectedSessionId]="selectedSessionId()"
    [email]="auth.user()?.email ?? null"
    [keyConfigured]="auth.hasConfiguredKey()"
    [keyLast4]="auth.keyStatus()?.last4 ?? null"
    (createSession)="createSession()"
    (selectSession)="goToSession($event)"
    (renameSession)="renameSession($event)"
    (deleteSession)="deleteSession($event)"
    (openProfile)="openProfileSettings()"
    (openApiKeys)="openApiKeySettings()"
    (logout)="logout()"
  ></app-session-sidebar>

  <div class="flex-1 flex flex-col min-w-0 h-full relative">
    <div class="absolute inset-0 bg-gradient-to-b from-transparent to-ui-950/50 pointer-events-none"></div>
    <app-chat-panel
      class="flex-1 h-full flex flex-col z-0 relative"
      [selectedAgentName]="selectedAgent()?.name ?? null"
      [selectedSessionTitle]="selectedSession()?.title ?? null"
      [keyLast4]="auth.keyStatus()?.last4 ?? null"
      [chatStatusLabel]="chatStatusLabel()"
      [chatStatusTone]="chatStatusTone()"
      [contextBudget]="contextBudget()"
      [messages]="messages()"
      [draft]="messageDraft"
      [streaming]="streaming()"
      [error]="error()"
      [hasAgent]="selectedAgentId() !== null"
      [hasAgents]="agents().length > 0"
      (draftChange)="updateDraft($event)"
      (send)="sendMessage()"
    ></app-chat-panel>
  </div>
</main>
